log_level = 'info'
max_retry = 10
port = 8883
retry_interval = 5000
server = '127.0.0.1'
sn = "CLIENT001"
token = "token123456"

# Modbus 设备配置
# 端口和寄存器地址与 scripts/modbus_simulator.py 严格匹配

# 温湿度传感器 - TCP 5020
[[devices]]
name = "sensor-1"
type = "tcp"
timeout = "5s"
offline_threshold = "30s"
enable_monitor = true
slave_id = 1
poll_interval = "1s"

[devices.tcp]
host = "127.0.0.1"
port = 5020        # 对应模拟器的温湿度传感器

# HR[0]: 温度 250 → 25.0°C (scale=0.1)
[[devices.points]]
name = "temperature"
function_code = 3    # Read Holding Registers
address = 0
quantity = 1
data_type = "int16"
byte_order = "abcd"
scale = 0.1
offset = 0
unit = "°C"
access = "ro"
cache_enabled = true

# HR[1]: 湿度 650 → 65.0% (scale=0.1)
[[devices.points]]
name = "humidity"
function_code = 3
address = 1
quantity = 1
data_type = "uint16"
byte_order = "abcd"
scale = 0.1
offset = 0
unit = "%"
access = "ro"
cache_enabled = true

# 智能电表 - TCP 5021
[[devices]]
name = "power-meter"
type = "tcp"
timeout = "5s"
slave_id = 1
poll_interval = "1s"

[devices.tcp]
host = "127.0.0.1"
port = 5021        # 对应模拟器的智能电表

# HR[100]: 电压 2200 → 220.0V (scale=0.1)
[[devices.points]]
name = "voltage"
function_code = 3
address = 100
quantity = 1
data_type = "uint16"
byte_order = "abcd"
scale = 0.1
offset = 0
unit = "V"
access = "ro"

# HR[102-103]: 电流 10.00A (float32, IEEE 754 big-endian)
[[devices.points]]
name = "current"
function_code = 3
address = 102
quantity = 2
data_type = "float32"
byte_order = "abcd"   # IEEE 754 big-endian
scale = 1.0
offset = 0
unit = "A"
access = "ro"

# HR[104-105]: 功率 2.2kW (float32, IEEE 754 big-endian)
[[devices.points]]
name = "power"
function_code = 3
address = 104
quantity = 2
data_type = "float32"
byte_order = "abcd"   # IEEE 754 big-endian
scale = 1.0
offset = 0
unit = "kW"
access = "ro"

