log_level = 'info'
max_retry = 10
port = 8883
retry_interval = 5000
server = '127.0.0.1'
sn = "CENTRAL001"
token = "token123456"

# Modbus 设备配置
# 支持 TCP 和 RTU 两种连接类型

# TCP 设备示例
[[devices]]
name = "sensor-1"
type = "tcp"
timeout = "5s"
offline_threshold = "30s"
enable_monitor = true
slave_id = 1
poll_interval = "10s"

  [devices.tcp]
  host = "127.0.0.1"
  port = 5020

  [[devices.points]]
  name = "temperature"
  function_code = 3
  address = 0
  quantity = 1
  data_type = "int16"
  byte_order = "abcd"  # 单寄存器类型忽略此字段
  scale = 0.1
  offset = 0
  unit = "°C"
  access = "ro"
  cache_enabled = true

  [[devices.points]]
  name = "humidity"
  function_code = 3
  address = 1
  quantity = 1
  data_type = "uint16"
  byte_order = "abcd"  # 单寄存器类型忽略此字段
  scale = 0.1
  offset = 0
  unit = "%"
  access = "ro"
  cache_enabled = true

# 第二个 TCP 设备示例（智能电表）
[[devices]]
name = "power-meter"
type = "tcp"
timeout = "5s"
slave_id = 1
poll_interval = "5s"

  [devices.tcp]
  host = "127.0.0.1"
  port = 5021

  # 单寄存器示例
  [[devices.points]]
  name = "voltage"
  function_code = 3
  address = 100
  quantity = 1
  data_type = "uint16"
  byte_order = "abcd"  # 单寄存器类型忽略此字段
  scale = 0.1
  offset = 0
  unit = "V"
  access = "ro"

  # 多寄存器示例（不同字节序）
  [[devices.points]]
  name = "current"
  function_code = 3
  address = 102
  quantity = 2
  data_type = "float32"
  byte_order = "abcd"  # Big-Endian (ABCD) - 标准 Modbus 字节序
  unit = "A"
  access = "ro"

  [[devices.points]]
  name = "power"
  function_code = 3
  address = 104
  quantity = 2
  data_type = "float32"
  byte_order = "dcba"  # Little-Endian (DCBA) - 逆序字节序
  unit = "kW"
  access = "ro"

