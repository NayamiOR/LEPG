# MQTT 虚拟设备配置
# Python 模拟器 (scripts/mqtt_simulator.py) 连接此 broker 发布数据

[mqtt]
broker_addr = "127.0.0.1:1883"

# 温湿度传感器
[[mqtt.devices]]
name = "温湿度传感器"
client_id = "SENSOR-TH-001"
keep_alive = "60s"
offline_threshold = "30s"
enable_monitor = true

[[mqtt.devices.topics]]
topic = "device/SENSOR-TH-001/reading/temperature"
qos = 1
point_name = "temperature"
unit = "°C"

[[mqtt.devices.topics]]
topic = "device/SENSOR-TH-001/reading/humidity"
qos = 1
point_name = "humidity"
unit = "%RH"

# 电表
[[mqtt.devices]]
name = "电表"
client_id = "METER-PWR-001"
keep_alive = "60s"
offline_threshold = "30s"
enable_monitor = true

[[mqtt.devices.topics]]
topic = "device/METER-PWR-001/reading/voltage"
qos = 1
point_name = "voltage"
unit = "V"

[[mqtt.devices.topics]]
topic = "device/METER-PWR-001/reading/current"
qos = 1
point_name = "current"
unit = "A"

[[mqtt.devices.topics]]
topic = "device/METER-PWR-001/reading/power"
qos = 1
point_name = "power"
unit = "kW"

[[mqtt.devices.topics]]
topic = "device/METER-PWR-001/reading/frequency"
qos = 1
point_name = "frequency"
unit = "Hz"

